- aid: shutterstock:shutterstock-api
  name: Shutterstock API
  description: The Shutterstock REST API v2 provides access to 350M+ images, videos, audio tracks, sound effects, and editorial
    content. It supports searching by keyword, color, category, and visual similarity (computer vision). Licensing operations
    support subscription and on-demand purchase models. Collections allow users to organize and save assets. OAuth 2.0 is
    required for licensed content operations; Basic Auth is available for search and browse endpoints.
