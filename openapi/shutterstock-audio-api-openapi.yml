                      title: Fresh Love
                      is_adult: false
                      lyrics: ''
                      media_type: audio
                      recording_version: ''
                      moods:
                      - Bright
                      - Confident
                      - Fun
                      - Happy
                      - Inspiring
                      - Optimistic
                      - Playful
                      - Sophisticated
                      - Stylish
                      - Uplifting
                      language: en
                      assets:
                        clean_audio:
                          file_size: 30760372
                        preview_mp3:
                          file_size: 3846606
                          url: https://ak.picdn.net/shutterstock/audio/434750/preview/preview.mp3
                        preview_ogg:
                          file_size: 4402608
