                      - Drums
                      - Electric guitar
                      - Pads
                      - Percussion
                      - Synthesizer
                      id: '434750'
                      isrc: ''
                      description: Pulsing and feel-good, featuring slick electric guitar, synthesizer, bass, electronic drum pads and drums that create a positive, celebratory mood.
                      similar_artists: []
