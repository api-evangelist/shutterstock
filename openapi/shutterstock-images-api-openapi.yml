                    is_illustration: true
                    has_model_release: false
                    has_property_release: true
                    keywords:
                    - abstract
                    - art
                    - artistic
                    - asian
                    - autumn
                    - background
                    - bunny
                    - calligraphy
                    - celebration
                    - china
                    media_type: image
                    url: https://www.shutterstock.com/image-photo/465011609
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - basic: []
      - customer_accessCode: []
      tags:
      - images
      operationId: getImage
      summary: Get details about images
      description: This endpoint shows information about an image, including a URL to a preview image and the sizes that it is available in.
  /v2/images/categories:
    get:
      parameters:
      - description: Language for the keywords and categories in the response
        in: query
        name: language
        example: es
        schema:
          $ref: '#/components/schemas/Language'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDataList'
              examples:
                response:
                  value:
                    data:
                    - id: '15'
                      name: Science
                    - id: '17'
                      name: Signs/Symbols
                    - id: '18'
                      name: Sports/Recreation
                    - id: '16'
                      name: Technology
                    - id: '0'
                      name: Transportation
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - basic: []
      - customer_accessCode: []
      tags:
      - images
      operationId: getImageCategories
      summary: List image categories
      description: This endpoint lists the categories (Shutterstock-assigned genres) that images can belong to.
  /v2/images/{id}/similar:
    get:
      parameters:
      - description: Image ID
        in: path
        name: id
        required: true
        example: '465011609'
        schema:
          type: string
      - description: Language for the keywords and categories in the response
        in: query
        name: language
        example: es
        schema:
          $ref: '#/components/schemas/Language'
      - description: Page number
        in: query
        name: page
        schema:
          type: integer
          minimum: 1
          default: 1
      - description: Number of results per page
        in: query
        name: per_page
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 20
      - description: Amount of detail to render in the response
        in: query
        name: view
        schema:
          type: string
          enum:
          - minimal
          - full
          default: minimal
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSearchResults'
              examples:
                response:
                  value:
                    page: 1
                    per_page: 1
                    total_count: 200
                    search_id: ''
                    data:
                    - id: '224429596'
                      aspect: 1
                      assets:
                        preview:
                          height: 450
