      security:
      - basic: []
      - customer_accessCode: []
      tags:
      - images
      operationId: getSimilarImages
      summary: List similar images
      description: This endpoint returns images that are visually similar to an image that you specify.
  /v2/images/licenses:
    post:
      parameters:
      - description: Subscription ID to use to license the image
        in: query
        name: subscription_id
        schema:
          type: string
      - description: Image format
        in: query
        name: format
        schema:
          type: string
          enum:
          - eps
          - jpg
          default: jpg
      - description: Image size
        in: query
        name: size
        schema:
          type: string
          enum:
          - small
          - medium
          - huge
          - vector
          - custom
          default: huge
      - description: Search ID that was provided in the results of an image search
        in: query
        name: search_id
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseImageResultDataList'
              examples:
                response:
                  value:
                    data:
                    - image_id: '547233985'
                      download:
                        url: https://download.shutterstock.com/gatekeeper/[random-characters]/shutterstock_547233985.jpg
                      allotment_charge: 1
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - customer_accessCode:
        - licenses.create
        - purchases.view
        ldap_accessCode:
        - user.view
      x-code-samples:
      - lang: shell
        source: "DATA='{\n  \"images\": [\n    {\n      \"image_id\": \"59656357\",\n      \"price\": 12.50,\n      \"metadata\": {\n        \"customer_id\": \"12345\"\n      }\n    }\n  ]\n}'\n\ncurl -X POST \"https://api.shutterstock.com/v2/images/licenses?subscription_id=$SUBSCRIPTION_ID\" \\\n-H \"Authorization: Bearer $SHUTTERSTOCK_API_TOKEN\" \\\n-H 'Content-Type: application/json' \\\n-d \"$DATA\"\n"
      - lang: javascript--nodejs
