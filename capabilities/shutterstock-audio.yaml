      - name: getsoundbox
        method: GET
        description: Get the details of audio collections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Collection ID
          required: true
      - name: renamesoundbox
        method: POST
        description: Rename audio collections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Collection ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesoundbox
        method: DELETE
        description: Delete audio collections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Collection ID
          required: true
    - name: v2-audio-collections-id-items
