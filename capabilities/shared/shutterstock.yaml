naftiko: "1.0.0-alpha1"

info:
  label: "Shutterstock API"
  description: >-
    Stock media search, browse, licensing, and collection management API
    providing access to 350M+ images, videos, audio tracks, sound effects,
    and editorial content from the Shutterstock library.
  tags:
    - Images
    - Videos
    - Audio
    - Stock Media
    - Licensing
    - Creative Content
    - Computer Vision
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SHUTTERSTOCK_ACCESS_TOKEN: SHUTTERSTOCK_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: shutterstock
      baseUri: https://api.shutterstock.com
      description: "Shutterstock stock media search, licensing, and management API"
      authentication:
        type: bearer
        token: "{{SHUTTERSTOCK_ACCESS_TOKEN}}"
      resources:
        - name: images
          path: /v2/images
          description: Stock image search, details, licensing, and collections
          operations:
            - name: search-images
              method: GET
              description: Search for stock images by keyword, color, category, and filters
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: false
                  description: Search query text
                - name: image_type
                  in: query
                  type: string
                  required: false
                  description: Filter by type (photo, illustration, vector)
                - name: orientation
                  in: query
                  type: string
                  required: false
                  description: Image orientation (horizontal, vertical, square)
                - name: color
                  in: query
                  type: string
                  required: false
                  description: Dominant color in hex
                - name: category
                  in: query
                  type: string
                  required: false
                  description: Category name or ID
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: Results per page (max 500)
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: Sort order (popular, newest, relevance)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-image
              method: GET
              description: Get details about a specific image by ID
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Shutterstock image ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-similar-images
              method: GET
              description: List images similar to a specified image
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Image ID to find similar images for
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: Results per page
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: license-images
              method: POST
              description: License one or more images from Shutterstock
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  images: "{{tools.images}}"
            - name: list-image-licenses
              method: GET
              description: List previously licensed images for the account
              inputParameters:
                - name: image_id
                  in: query
                  type: string
                  required: false
                  description: Filter by specific image ID
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: Results per page
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-image-search-suggestions
              method: GET
              description: Get keyword suggestions for image search
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: true
                  description: Partial search query for suggestions
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-image-categories
              method: GET
              description: List all available image categories
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: videos
          path: /v2/videos
          description: Stock video search, details, licensing, and collections
          operations:
            - name: search-videos
              method: GET
              description: Search for stock videos by keyword and filters
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: false
                  description: Search query text
                - name: resolution
                  in: query
                  type: string
                  required: false
                  description: Video resolution filter (4k, high_definition, standard_definition)
                - name: duration_from
                  in: query
                  type: integer
                  required: false
                  description: Minimum clip duration in seconds
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: Results per page
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: Sort order
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-video
              method: GET
              description: Get details about a specific video
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Shutterstock video ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: license-videos
              method: POST
              description: License one or more videos
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  videos: "{{tools.videos}}"

        - name: audio
          path: /v2/audio
          description: Music and sound effects search, licensing, and collections
          operations:
            - name: search-audio
              method: GET
              description: Search for music tracks and audio content
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: false
                  description: Search query text
                - name: genre
                  in: query
                  type: array
                  required: false
                  description: Music genre filter
                - name: moods
                  in: query
                  type: array
                  required: false
                  description: Mood filter
                - name: duration_from
                  in: query
                  type: integer
                  required: false
                  description: Minimum duration in seconds
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: Results per page
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: license-audio
              method: POST
              description: License music tracks
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  audio: "{{tools.audio}}"

        - name: editorial
          path: /v2/editorial
          description: Editorial news and event imagery search and licensing
          operations:
            - name: search-editorial-images
              method: GET
              description: Search editorial images for news and documentary use
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: true
                  description: Search query text
                - name: country
                  in: query
                  type: string
                  required: true
                  description: Country code for licensing
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: Results per page
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: computer-vision
          path: /v2/cv
          description: AI-powered image analysis and visual similarity search
          operations:
            - name: find-similar-images
              method: GET
              description: Find visually similar images to an uploaded reference
              inputParameters:
                - name: asset_id
                  in: query
                  type: string
                  required: true
                  description: Asset ID of uploaded reference image
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: Results per page
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-keywords
              method: GET
              description: Get AI-suggested keywords for an uploaded image
              inputParameters:
                - name: asset_id
                  in: query
                  type: string
                  required: true
                  description: Asset ID of uploaded image
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: collections
          path: /v2/images/collections
          description: User image collection management
          operations:
            - name: list-image-collections
              method: GET
              description: List all image collections for the user
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-image-collection
              method: POST
              description: Create a new image collection
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"

        - name: users
          path: /v2/user
          description: User account and subscription information
          operations:
            - name: get-user
              method: GET
              description: Get details about the authenticated user account
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-subscriptions
              method: GET
              description: List user's active subscriptions
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: shutterstock-rest
      resources:
        - path: /v1/images/search
          name: image-search
          description: Image search
          operations:
            - method: GET
              name: search-images
              description: Search stock images
              call: "shutterstock.search-images"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/videos/search
          name: video-search
          description: Video search
          operations:
            - method: GET
              name: search-videos
              description: Search stock videos
              call: "shutterstock.search-videos"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: shutterstock-mcp
      transport: http
      tools:
        - name: search-images
          description: Search Shutterstock stock images
          call: "shutterstock.search-images"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-videos
          description: Search Shutterstock stock videos
          call: "shutterstock.search-videos"
          outputParameters:
            - type: object
              mapping: "$."
